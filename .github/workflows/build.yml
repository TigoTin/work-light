name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows amd64
            platform: windows
            runner: windows-latest
            script: scripts/build-windows.sh
            artifact: work-light-windows-amd64
            binary: work-light.exe
          - name: macOS native
            platform: macos
            runner: macos-latest
            script: scripts/build-macos.sh
            artifact: work-light-macos-native
            binary: work-light-darwin-*
          - name: Linux native
            platform: linux
            runner: ubuntu-24.04
            script: scripts/build-linux.sh
            artifact: work-light-linux-native
            binary: work-light-linux-*

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux WebView dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Build
        shell: bash
        run: bash "${{ matrix.script }}"

      - name: Package executable
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          binary=$(find dist -maxdepth 1 -type f -name '${{ matrix.binary }}' | head -n 1)
          if [[ -z "$binary" ]]; then
            echo "No executable found for pattern: ${{ matrix.binary }}" >&2
            exit 1
          fi
          chmod +x "$binary" || true
          package="work-light-${{ matrix.platform }}-$(go env GOARCH).tar.gz"
          tar -C dist -czf "release/$package" "$(basename "$binary")"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: release/*
          if-no-files-found: error

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
